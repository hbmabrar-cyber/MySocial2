<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySocial</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0f0f13;--surface:#1a1a24;--card:#22222f;--border:#2e2e3f;
--accent:#6c63ff;--accent2:#a78bfa;--text:#e8e8f0;--muted:#8888aa;
--danger:#ff4f4f;--success:#4fbe79;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f13 0%,#1a1228 100%);}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:92%;max-width:380px;}
.auth-logo{font-size:28px;font-weight:800;color:var(--accent2);text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);}
.auth-tab.active{background:var(--accent);color:#fff;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;}
.input-group input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;}
.input-group input:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.auth-msg{text-align:center;font-size:13px;margin-top:14px;padding:10px;border-radius:8px;display:none;}
.auth-msg.error{background:#ff4f4f22;color:var(--danger);display:block;}
.auth-msg.success{background:#4fbe7922;color:var(--success);display:block;}
#app-screen{display:none;max-width:480px;margin:0 auto;padding-bottom:80px;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:20px;font-weight:800;color:var(--accent2);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700;}
.badge.show{display:flex;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:20px;color:var(--muted);position:relative;}
.nav-item.active{color:var(--accent);}
.nav-badge{position:absolute;top:6px;right:20%;background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700;}
.nav-badge.show{display:flex;}
.page{display:none;padding:0 0 12px;}
.page.active{display:block;}
.composer{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.composer-top{display:flex;gap:12px;align-items:flex-start;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.composer textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;font-family:inherit;outline:none;min-height:60px;}
.composer textarea:focus{border-color:var(--accent);}
.composer-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-left:52px;}
.compose-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}
.img-btn{padding:8px 12px;background:var(--card);color:var(--accent2);border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;}
#compose-img-preview{margin-top:10px;padding-left:52px;display:none;}
#compose-img-preview img{max-width:200px;max-height:150px;border-radius:10px;}
.timer-info{font-size:11px;color:var(--muted);padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);text-align:center;}
.timer-info span{color:var(--accent2);font-weight:600;}
.post-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-name{font-weight:700;font-size:14px;}
.post-time{font-size:11px;color:var(--muted);margin-left:auto;}
.post-expires{font-size:10px;color:var(--danger);display:block;}
.post-text{font-size:14px;line-height:1.6;margin-bottom:10px;}
.post-img{width:100%;border-radius:12px;margin-bottom:10px;max-height:300px;object-fit:cover;}
.post-actions{display:flex;gap:16px;}
.post-action-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 0;}
.post-action-btn.liked{color:#ff6b81;}
.empty-feed{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-feed .empty-icon{font-size:48px;margin-bottom:12px;}
.profile-header{background:var(--surface);padding:24px 16px;border-bottom:1px solid var(--border);text-align:center;}
.profile-avatar-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden;border:3px solid var(--accent);}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-btn{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:2px solid var(--bg);}
.profile-name{font-size:20px;font-weight:800;margin-bottom:4px;}
.profile-bio{font-size:13px;color:var(--muted);margin-bottom:16px;}
.profile-edit-form{display:none;}
.profile-edit-form input,.profile-edit-form textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;}
.profile-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-outline{padding:8px 20px;background:transparent;color:var(--accent2);border:1px solid var(--accent);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-danger-outline{padding:8px 20px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.msg-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.msg-info{flex:1;}
.msg-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.msg-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.msg-time{font-size:11px;color:var(--muted);}
.msg-unread{background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.msg-unread.show{display:flex;}
#chat-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;}
#chat-screen.open{display:flex;}
.chat-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.chat-back{font-size:20px;cursor:pointer;color:var(--accent2);}
.chat-name{font-weight:700;font-size:16px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.chat-bubble.mine{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.theirs{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.chat-input-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:center;}
.chat-input-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.chat-send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-box input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:inherit;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.friend-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.friend-info{flex:1;}
.friend-name{font-weight:700;font-size:14px;}
.friend-email{font-size:11px;color:var(--muted);}
.friend-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.btn-add{background:var(--accent);color:#fff;}
.btn-accept{background:var(--success);color:#fff;}
.btn-reject{background:var(--danger);color:#fff;margin-left:6px;}
.btn-pending{background:var(--card);color:var(--muted);border:1px solid var(--border);}
.btn-friends{background:var(--card);color:var(--accent2);border:1px solid var(--border);}
.notif-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.notif-item.unread{background:#6c63ff11;}
.notif-icon{font-size:24px;}
.notif-text{flex:1;font-size:13px;line-height:1.5;}
.notif-time{font-size:11px;color:var(--muted);}
.section-title{padding:14px 16px 6px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--border);}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">✦ MySocial</div>
    <div class="auth-sub">তোমার নিজস্ব সোশ্যাল স্পেস</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">লগইন</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">রেজিস্টার</div>
    </div>
    <div id="login-form">
      <div class="input-group"><label>ইমেইল</label><input type="email" id="login-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>পাসওয়ার্ড</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">লগইন করো</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="input-group"><label>নাম</label><input type="text" id="reg-name" placeholder="তোমার নাম"></div>
      <div class="input-group"><label>ইমেইল</label><input type="email" id="reg-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>পাসওয়ার্ড</label><input type="password" id="reg-pass" placeholder="কমপক্ষে ৬ অক্ষর"></div>
      <button class="btn-primary" onclick="doRegister()">অ্যাকাউন্ট তৈরি করো</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>
  <div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">✦ MySocial</div>
    <div class="topbar-right">
      <div class="notif-btn" onclick="showPage('notifications')">
        🔔<span class="badge" id="notif-badge">0</span>
      </div>
      <div class="icon-btn" onclick="doLogout()">🚪</div>
    </div>
  </div>
  <div class="page active" id="page-feed">
    <div class="composer">
      <div class="composer-top">
        <div class="avatar" id="composer-avatar">?</div>
        <textarea id="post-text" placeholder="কী মনে হচ্ছে আজকে?" rows="2"></textarea>
      </div>
      <div id="compose-img-preview"><img id="compose-preview-img" src=""></div>
      <div class="composer-actions">
        <label class="img-btn" for="post-img-input">📷 ছবি</label>
        <input type="file" id="post-img-input" accept="image/*" style="display:none" onchange="previewImage(this)">
        <button class="compose-btn" onclick="submitPost()">পোস্ট করো ✦</button>

    <div id="feed-loading" class="loading"><span class="spinner"></span>লোড হচ্ছে...</div>
    <div id="feed-list"></div>
  </div>
  <div class="page" id="page-messages">
    <div class="section-title">মেসেজ</div>
    <div style="padding:12px 16px;">
      <button class="btn-primary" onclick="openNewMsg()" style="border-radius:20px;padding:10px 20px;font-size:13px;width:auto;">✉ নতুন মেসেজ</button>
    </div>
    <div id="msg-list"></div>
  </div>
  <div class="page" id="page-friends">
    <div class="section-title">ফ্রেন্ড রিকোয়েস্ট</div>
    <div id="friend-requests-list"></div>
    <div class="section-title">বন্ধু খোঁজো</div>
    <div style="padding:12px 16px;">
      <input type="email" id="search-email" placeholder="ইমেইল দিয়ে খোঁজো..." style="width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;font-family:inherit;">
      <button class="btn-primary" onclick="searchUser()" style="margin-top:10px;border-radius:20px;">খোঁজো</button>
    </div>
    <div id="search-result"></div>
    <div class="section-title">আমার বন্ধুরা</div>
    <div id="friends-list"></div>
  </div>
  <div class="page" id="page-notifications">
    <div class="section-title">নোটিফিকেশন</div>
    <div id="notif-list"></div>
  </div>
  <div class="page" id="page-profile">
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profile-avatar-big">?</div>
        <label class="avatar-edit-btn" for="avatar-input">✏️</label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="profile-name" id="profile-name-display">লোড হচ্ছে...</div>
      <div class="profile-bio" id="profile-bio-display">কোনো বায়ো নেই</div>
      <div class="profile-edit-form" id="profile-edit-form">
        <input type="text" id="edit-name" placeholder="তোমার নাম">
        <textarea id="edit-bio" placeholder="তোমার সম্পর্কে কিছু লেখো..." rows="2" style="resize:none;width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;"></textarea>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn-primary" onclick="saveProfile()" style="width:auto;padding:8px 24px;border-radius:20px;">সেভ করো</button>
          <button class="btn-outline" onclick="cancelEdit()">বাতিল</button>
        </div>
      </div>
      <div class="profile-btns" id="profile-btns">
        <button class="btn-outline" onclick="editProfile()">✏ প্রোফাইল এডিট</button>
        <button class="btn-danger-outline" onclick="doLogout()">লগআউট</button>
      </div>
    </div>
    <div class="section-title">আমার পোস্টগুলো</div>
    <div id="my-posts-list"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-feed" onclick="showPage('feed')">🏠</div>
    <div class="nav-item" id="nav-messages" onclick="showPage('messages')">💬<span class="nav-badge" id="msg-nav-badge">0</span></div>
    <div class="nav-item" id="nav-friends" onclick="showPage('friends')">👥<span class="nav-badge" id="friend-nav-badge">0</span></div>
    <div class="nav-item" id="nav-profile" onclick="showPage('profile')">👤</div>
  </div>
</div>
<div id="chat-screen">
  <div class="chat-topbar">
    <div class="chat-back" onclick="closeChat()">←</div>
    <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:14px;">?</div>
    <div class="chat-name" id="chat-name">চ্যাট</div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="মেসেজ লেখো...">
    <button class="chat-send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>
<div class="modal-overlay" id="new-msg-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeNewMsg()">✕</button>
    <div class="modal-title">নতুন মেসেজ</div>
    <input type="email" id="new-msg-email" placeholder="প্রাপকের ইমেইল লেখো">
    <button class="btn-primary" onclick="startNewChat()">চ্যাট শুরু করো</button>
  </div>
</div>

function avatarInitial(name){return name?name[0].toUpperCase():'?';}
function timeAgo(ts){if(!ts)return'';const ms=ts.toMillis?ts.toMillis():ts.seconds*1000;const diff=Date.now()-ms;const m=Math.floor(diff/60000);const h=Math.floor(diff/3600000);if(m<1)return'এইমাত্র';if(m<60)return m+' মিনিট আগে';if(h<24)return h+' ঘণ্টা আগে';return Math.floor(h/24)+' দিন আগে';}
function expiresIn(expMs){const r=expMs-Date.now();if(r<=0)return'মুছে যাচ্ছে...';const h=Math.floor(r/3600000);const m=Math.floor((r%3600000)/60000);return h+'ঘ '+m+'মি পরে মুছবে';}
function switchTab(tab){document.getElementById('tab-login').classList.toggle('active',tab==='login');document.getElementById('tab-register').classList.toggle('active',tab==='register');document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none';document.getElementById('auth-msg').className='auth-msg';}
async function doRegister(){const name=document.getElementById('reg-name').value.trim();const email=document.getElementById('reg-email').value.trim();const pass=document.getElementById('reg-pass').value;const msg=document.getElementById('auth-msg');if(!name||!email||!pass){msg.textContent='সব ঘর পূরণ করো।';msg.className='auth-msg error';return;}try{const cred=await auth.createUserWithEmailAndPassword(email,pass);await cred.user.updateProfile({displayName:name});await db.collection('users').doc(cred.user.uid).set({name,email,bio:'',avatar:'',createdAt:firebase.firestore.FieldValue.serverTimestamp()});msg.textContent='অ্যাকাউন্ট তৈরি হয়েছে!';msg.className='auth-msg success';}catch(e){msg.textContent=e.code==='auth/email-already-in-use'?'এই ইমেইল আগেই রেজিস্টার করা।':'সমস্যা: '+e.message;msg.className='auth-msg error';}}
async function doLogin(){const email=document.getElementById('login-email').value.trim();const pass=document.getElementById('login-pass').value;const msg=document.getElementById('auth-msg');try{await auth.signInWithEmailAndPassword(email,pass);}catch(e){msg.textContent='ইমেইল বা পাসওয়ার্ড ভুল।';msg.className='auth-msg error';}}
async function doLogout(){await auth.signOut();}
auth.onAuthStateChanged(async(user)=>{if(user){currentUser=user;const snap=await db.collection('users').doc(user.uid).get();currentUserData=snap.exists?snap.data():{name:user.displayName||'User',bio:'',avatar:''};document.getElementById('auth-screen').style.display='none';document.getElementById('app-screen').style.display='block';loadUserUI();loadFeed();loadMessages();loadFriendRequests();loadNotifications();cleanupExpiredPosts();}else{currentUser=null;currentUserData=null;document.getElementById('auth-screen').style.display='flex';document.getElementById('app-screen').style.display='none';if(feedUnsub)feedUnsub();}});
function loadUserUI(){const name=currentUserData.name||currentUser.displayName||'User';const av=currentUserData.avatar;document.getElementById('composer-avatar').innerHTML=av?'<img src="'+av+'">':avatarInitial(name);document.getElementById('profile-name-display').textContent=name;document.getElementById('profile-bio-display').textContent=currentUserData.bio||'কোনো বায়ো নেই';document.getElementById('profile-avatar-big').innerHTML=av?'<img src="'+av+'">':avatarInitial(name);}
function showPage(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('page-'+page).classList.add('active');const navEl=document.getElementById('nav-'+page);if(navEl)navEl.classList.add('active');if(page==='messages')loadMessages();if(page==='profile'){loadUserUI();loadMyPosts();}if(page==='friends'){loadFriendRequests();loadFriends();}if(page==='notifications')loadNotifications();}
function previewImage(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{document.getElementById('compose-img-preview').style.display='block';document.getElementById('compose-preview-img').src=e.target.result;};reader.readAsDataURL(file);}
async function submitPost(){const text=document.getElementById('post-text').value.trim();const imgFile=document.getElementById('post-img-input').files[0];if(!text&&!imgFile){showToast('কিছু লেখো বা ছবি দাও!');return;}let imgUrl='';if(imgFile){showToast('ছবি আপলোড হচ্ছে...');imgUrl=await toBase64(imgFile);}try{const expireAt=new Date(Date.now()+5*3600000);await db.collection('posts').add({uid:currentUser.uid,name:currentUserData.name||currentUser.displayName,avatar:currentUserData.avatar||'',text,imgUrl,likes:0,likedBy:[],createdAt:firebase.firestore.FieldValue.serverTimestamp(),expiresAt:expireAt});document.getElementById('post-text').value='';document.getElementById('post-img-input').value='';document.getElementById('compose-img-preview').style.display='none';showToast('পোস্ট করা হয়েছে! ✦');}catch(e){showToast('সমস্যা হয়েছে.');}}
function toBase64(file){return new Promise((resolve)=>{const reader=new FileReader();reader.onload=e=>resolve(e.target.result);reader.readAsDataURL(file);});}
function loadFeed(){const feedList=document.getElementById('feed-list');const loading=document.getElementById('feed-loading');feedUnsub=db.collection('posts').orderBy('createdAt','desc').onSnapshot((snap)=>{loading.style.display='none';const now=Date.now();const posts=snap.docs.filter(d=>{const data=d.data();if(!data.expiresAt)return true;const expMs=data.expiresAt.toMillis?data.expiresAt.toMillis():new Date(data.expiresAt).getTime();return expMs>now;});if(posts.length===0){feedList.innerHTML='<div class="empty-feed"><div class="empty-icon">✦</div><div>এখনো কোনো পোস্ট নেই<br><small>প্রথম পোস্টটা তুমিই করো!</small></div></div>';return;}feedList.innerHTML=posts.map(d=>{const p=d.data();const av=p.avatar?'<img src="'+p.avatar+'">':avatarInitial(p.name||'?');const liked=p.likedBy&&p.likedBy.includes(currentUser.uid);const expMs=p.expiresAt?(p.expiresAt.toMillis?p.expiresAt.toMillis():new Date(p.expiresAt).getTime()):null;return'<div class="post-card"><div class="post-header"><div class="avatar" style="width:36px;height:36px;font-size:14px;">'+av+'</div><div><div class="post-name">'+(p.name||'User')+'</div>'+(expMs?'<span class="post-expires">⏱ '+expiresIn(expMs)+'</span>':'')+'</div><div class="post-time">'+timeAgo(p.createdAt)+'</div></div>'+(p.text?'<div class="post-text">'+p.text+'</div>':'')+(p.imgUrl?'<img class="post-img" src="'+p.imgUrl+'">':'')+'<div class="post-actions"><button class="post-action-btn '+(liked?'liked':'')+'" onclick="toggleLike(\''+d.id+'\','+liked+')">❤ '+(p.likes||0)+'</button>'+(p.uid!==currentUser.uid?'<button class="post-action-btn" onclick="openChatByUid(\''+p.uid+'\',\''+(p.name||'User')+'\',\''+(p.avatar||'')+'\')">💬 মেসেজ</button>':'<button class="post-action-btn" onclick="deletePost(\''+d.id+'\')">🗑 মুছো</button>')+'</div></div>';}).join('');});}
async function toggleLike(postId,wasLiked){const ref=db.collection('posts').doc(postId);const snap=await ref.get();if(!snap.exists)return;const data=snap.data();let likedBy=data.likedBy||[];let likes=data.likes||0;if(wasLiked){likedBy=likedBy.filter(u=>u!==currentUser.uid);likes=Math.max(0,likes-1);}else{likedBy.push(currentUser.uid);likes++;}await ref.update({likedBy,likes});}
async function deletePost(postId){if(!confirm('এই পোস্ট মুছে ফেলবে?'))return;await db.collection('posts').doc(postId).delete();showToast('পোস্ট মুছে গেছে।');}
async function cleanupExpiredPosts(){const snap=await db.collection('posts').get();const now=Date.now();snap.forEach(d=>{const data=d.data();if(!data.expiresAt)return;const expMs=data.expiresAt.toMillis?data.expiresAt.toMillis():new Date(data.expiresAt).getTime();if(expMs<now)d.ref.delete();});}
setInterval(cleanupExpiredPosts,5*60000);
async function loadMyPosts(){const list=document.getElementById('my-posts-list');list.innerHTML='<div class="loading"><span class="spinner"></span>লোড হচ্ছে...</div>';const snap=await db.collection('posts').orderBy('createdAt','desc').get();const now=Date.now();const mine=snap.docs.filter(d=>{if(d.data().uid!==currentUser.uid)return false;const data=d.data();if(!data.expiresAt)return true;const expMs=data.expiresAt.toMillis?data.expiresAt.toMillis():new Date(data.expiresAt).getTime();return expMs>now;});if(mine.length===0){list.innerHTML='<div class="empty-feed"><div class="empty-icon">📝</div><div>তোমার কোনো পোস্ট নেই</div></div>';return;}list.innerHTML=mine.map(d=>{const p=d.data();return'<div class="post-card"><div class="post-header"><div class="post-name">'+(p.text?p.text.substring(0,40)+(p.text.length>40?'...':''):'ছবি পোস্ট')+'</div><div class="post-time">'+timeAgo(p.createdAt)+'</div></div>'+(p.imgUrl?'<img class="post-img" src="'+p.imgUrl+'" style="max-height:180px;">':'')+'<div class="post-actions"><span style="color:var(--muted);font-size:13px;">❤ '+(p.likes||0)+'</span><button class="post-action-btn" onclick="deletePost(\''+d.id+'\')">🗑 মুছো</button></div></div>';}).join('');}
function editProfile(){document.getElementById('edit-name').value=currentUserData.name||'';document.getElementById('edit-bio').value=currentUserData.bio||'';document.getElementById('profile-edit-form').style.display='block';document.getElementById('profile-btns').style.display='none';}
function cancelEdit(){document.getElementById('profile-edit-form').style.display='none';document.getElementById('profile-btns').style.display='flex';}
async function saveProfile(){const name=document.getElementById('edit-name').value.trim();const bio=document.getElementById('edit-bio').value.trim();if(!name){showToast('নাম দেওয়া জরুরি!');return;}await db.collection('users').doc(currentUser.uid).set({name,bio},{merge:true});currentUserData.name=name;currentUserData.bio=bio;loadUserUI();cancelEdit();showToast('প্রোফাইল আপডেট হয়েছে!');}
function uploadAvatar(input){const file=input.files[0];if(!file)return;showToast('আপলোড হচ্ছে...');const reader=new FileReader();reader.onload=async e=>{const base64=e.target.result;await db.collection('users').doc(currentUser.uid).set({avatar:base64},{merge:true});currentUserData.avatar=base64;loadUserUI();showToast('প্রোফাইল ছবি আপডেট হয়েছে!');};reader.readAsDataURL(file);}
function getChatId(uid1,uid2){return[uid1,uid2].sort().join('_');}
async function loadMessages(){const list=document.getElementById('msg-list');list.innerHTML='<div class="loading"><span class="spinner"></span>লোড হচ্ছে...</div>';const snap=await db.collection('chats').get();const myChats=snap.docs.filter(d=>d.id.includes(currentUser.uid));if(myChats.length===0){list.innerHTML='<div class="empty-feed"><div class="empty-icon">💬</div><div>কোনো মেসেজ নেই<br><small>নতুন মেসেজ শুরু করো</small></div></div>';return;}let unreadTotal=0;list.innerHTML=myChats.map(d=>{const data=d.data();const otherUid=d.id.replace(currentUser.uid,'').replace('_','');const otherName=(data.names&&data.names[otherUid])?data.names[otherUid]:'User';const otherAvatar=(data.avatars&&data.avatars[otherUid])?data.avatars[otherUid]:'';const unread=(data.unread&&data.unread[currentUser.uid])||0;if(unread>0)unreadTotal++;const av=otherAvatar?'<img src="'+otherAvatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">':avatarInitial(otherName);return'<div class="msg-item" onclick="openChatById(\''+d.id+'\',\''+otherUid+'\',\''+otherName+'\',\''+otherAvatar+'\')">'+'<div class="avatar" style="width:44px;height:44px;">'+av+'</div>'+'<div class="msg-info"><div class="msg-name">'+otherName+'</div><div class="msg-preview">'+(data.lastMsg||'...')+'</div></div>'+'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><div class="msg-time">'+(data.lastAt?timeAgo(data.lastAt):'')+'</div>'+(unread>0?'<div class="msg-unread show">'+unread+'</div>':'')+'</div></div>';}).join('');const badge=document.getElementById('msg-nav-badge');if(unreadTotal>0){badge.textContent=unreadTotal;badge.classList.add('show');}else{badge.classList.remove('show');}}
function openNewMsg(){document.getElementById('new-msg-modal').classList.add('open');}
function closeNewMsg(){document.getElementById('new-msg-modal').classList.remove('open');document.getElementById('new-msg-email').value='';}
async function startNewChat(){const email=document.getElementById('new-msg-email').value.trim();if(!email){showToast('ইমেইল দাও!');return;}if(email===currentUser.email){showToast('নিজেকে মেসেজ করা যাবে না!');return;}const snap=await db.collection('users').where('email','==',email).get();if(snap.empty){showToast('এই ইমেইলের কোনো ব্যবহারকারী নেই।');return;}const otherDoc=snap.docs[0];const otherData=otherDoc.data();closeNewMsg();openChatById(getChatId(currentUser.uid,otherDoc.id),otherDoc.id,otherData.name,otherData.avatar||'');}
function openChatByUid(uid,name,avatar){openChatById(getChatId(currentUser.uid,uid),uid,name,avatar);}
function openChatById(chatId,otherUid,otherName,otherAvatar){currentChatId=chatId;currentChatUser={uid:otherUid,name:otherName,avatar:otherAvatar};document.getElementById('chat-name').textContent=otherName;const av=document.getElementById('chat-avatar');av.innerHTML=otherAvatar?'<img src="'+otherAvatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">':avatarInitial(otherName);document.getElementById('chat-screen').classList.add('open');document.getElementById('chat-messages').innerHTML='<div class="loading"><span class="spinner"></span></div>';db.collection('chats').doc(chatId).set({unread:{[currentUser.uid]:0}},{merge:true});if(chatUnsub)chatUnsub();chatUnsub=db.collection('chats').doc(chatId).collection('messages').orderBy('createdAt','asc').onSnapshot(snap=>{const msgs=snap.docs;document.getElementById('chat-messages').innerHTML=msgs.length=
