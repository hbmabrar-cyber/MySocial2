<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0f0f13;--surface:#1a1a24;--card:#22222f;--border:#2e2e3f;
--accent:#6c63ff;--accent2:#a78bfa;--text:#e8e8f0;--muted:#8888aa;
--danger:#ff4f4f;--success:#4fbe79;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f13 0%,#1a1228 100%);}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:92%;max-width:380px;}
.auth-logo{font-size:28px;font-weight:800;color:var(--accent2);text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);}
.auth-tab.active{background:var(--accent);color:#fff;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;}
.input-group input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;}
.input-group input:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.auth-msg{text-align:center;font-size:13px;margin-top:14px;padding:10px;border-radius:8px;display:none;}
.auth-msg.error{background:#ff4f4f22;color:var(--danger);display:block;}
.auth-msg.success{background:#4fbe7922;color:var(--success);display:block;}
#app-screen{display:none;max-width:480px;margin:0 auto;padding-bottom:80px;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:20px;font-weight:800;color:var(--accent2);}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:20px;color:var(--muted);}
.nav-item.active{color:var(--accent);}
.page{display:none;padding:0 0 12px;}
.page.active{display:block;}
.composer{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.composer-top{display:flex;gap:12px;align-items:flex-start;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.composer textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;font-family:inherit;outline:none;min-height:60px;}
.composer-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-left:52px;}
.compose-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}
.img-btn{padding:8px 12px;background:var(--card);color:var(--accent2);border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;}
#compose-img-preview{margin-top:10px;padding-left:52px;display:none;}
#compose-img-preview img{max-width:200px;max-height:150px;border-radius:10px;}
.timer-info{font-size:11px;color:var(--muted);padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);text-align:center;}
.timer-info span{color:var(--accent2);font-weight:600;}
.post-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-name{font-weight:700;font-size:14px;display:flex;align-items:center;}
.post-time{font-size:11px;color:var(--muted);margin-left:auto;}
.post-expires{font-size:10px;color:var(--danger);display:block;}
.post-text{font-size:14px;line-height:1.6;margin-bottom:10px;}
.post-img{width:100%;border-radius:12px;margin-bottom:10px;max-height:300px;object-fit:cover;}
.post-actions{display:flex;gap:16px; margin-bottom:10px;}
.post-action-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 0;}
.post-action-btn.liked{color:#ff6b81;}
/* Comments CSS */
.comments-section{border-top:1px solid var(--border);padding-top:10px;}
.comment-list{max-height:150px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:6px;}
.comment-item{background:var(--bg);padding:8px 10px;border-radius:10px;font-size:12px;display:flex;flex-direction:column;}
.comment-author{font-weight:700;color:var(--accent2);margin-bottom:2px;}
.comment-input-wrap{display:flex;gap:8px;}
.comment-input-wrap input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;}
.comment-input-wrap button{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:0 14px;font-size:12px;cursor:pointer;font-weight:600;}

.empty-feed{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-feed .empty-icon{font-size:48px;margin-bottom:12px;}
.profile-header{background:var(--surface);padding:24px 16px;border-bottom:1px solid var(--border);text-align:center;}
.profile-avatar-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden;border:3px solid var(--accent);}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-btn{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:2px solid var(--bg);}
.profile-name{font-size:20px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;justify-content:center;}
.profile-bio{font-size:13px;color:var(--text);margin-bottom:8px;}
.profile-personal-details{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;flex-direction:column;gap:4px;align-items:center;}
.detail-item{display:flex;gap:6px;align-items:center;}
.profile-edit-form{display:none;}
.profile-edit-form input, .profile-edit-form select, .profile-edit-form textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;}
.profile-btns{display:flex;gap:10px;justify-content:center;}
.btn-outline{padding:8px 20px;background:transparent;color:var(--accent2);border:1px solid var(--accent);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-danger-outline{padding:8px 20px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.msg-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.msg-info{flex:1;}
.msg-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.msg-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.msg-time{font-size:11px;color:var(--muted);}
#chat-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;}
#chat-screen.open{display:flex;}
.chat-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.chat-back{font-size:20px;cursor:pointer;color:var(--accent2);}
.chat-name{font-weight:700;font-size:16px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.chat-bubble.mine{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.theirs{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.chat-input-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:center;}
.chat-input-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.chat-send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-box input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:inherit;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.section-title{padding:14px 16px 6px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--border);}
#toast.show{opacity:1;}
.verified-icon { color: #1DA1F2; margin-left: 5px; font-size: 16px; }
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">✦ GoChat</div>
    <div class="auth-sub">Your own social space</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>
    <div id="login-form">
      <div class="input-group"><label>Email</label><input type="email" id="login-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="input-group"><label>Name</label><input type="text" id="reg-name" placeholder="Your name"></div>
      <div class="input-group"><label>Email</label><input type="email" id="reg-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="reg-pass" placeholder="At least 6 characters"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">✦ GoChat</div>
    <div class="icon-btn" onclick="doLogout()">🚪</div>
  </div>
  <div class="page active" id="page-feed">
    <div class="composer">
      <div class="composer-top">
        <div class="avatar" id="composer-avatar">?</div>
        <textarea id="post-text" placeholder="What's on your mind?" rows="2"></textarea>
      </div>
      <div id="compose-img-preview"><img id="compose-preview-img" src=""></div>
      <div class="composer-actions">
        <label class="img-btn" for="post-img-input">📷 Photo</label>
        <input type="file" id="post-img-input" accept="image/*" style="display:none" onchange="previewImage(this)">
        <button class="compose-btn" onclick="submitPost()">Post ✦</button>
      </div>
    </div>
    <div class="timer-info">⏱ Posts will be automatically deleted after <span>5 hours</span></div>
    <div id="feed-loading" class="loading"><span class="spinner"></span>Loading...</div>
    <div id="feed-list"></div>
  </div>
  <div class="page" id="page-messages">
    <div class="section-title">Messages</div>
    <div style="padding:12px 16px;">
      <button class="btn-primary" onclick="openNewMsg()" style="border-radius:20px;padding:10px 20px;font-size:13px;width:auto;">✉ New Message</button>
    </div>
    <div id="msg-list"></div>
  </div>
  <div class="page" id="page-profile">
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profile-avatar-big">?</div>
        <label class="avatar-edit-btn" for="avatar-input">✏️</label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </div>
      <div class="profile-name" id="profile-name-display">Loading...</div>
      <div class="profile-bio" id="profile-bio-display">No bio yet</div>
      
      <div class="profile-personal-details" id="profile-details-display"></div>

      <div class="profile-edit-form" id="profile-edit-form">
        <input type="text" id="edit-name" placeholder="Your name">
        <textarea id="edit-bio" placeholder="Write a short bio..." rows="2" style="resize:none;"></textarea>
        
        <input type="text" id="edit-location" placeholder="📍 Current Location (e.g. Dhaka)">
        <input type="text" id="edit-hometown" placeholder="🏡 Home Town">
        <select id="edit-relationship">
          <option value="">💞 Relationship Status</option>
          <option value="Single">Single</option>
          <option value="In a relationship">In a relationship</option>
          <option value="Married">Married</option>
          <option value="Complicated">It's Complicated</option>
        </select>
        <select id="edit-gender">
          <option value="">👤 Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Custom">Custom</option>
        </select>

        <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
          <button class="btn-primary" onclick="saveProfile()" style="width:auto;padding:8px 24px;border-radius:20px;">Save</button>
          <button class="btn-outline" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>
      <div class="profile-btns" id="profile-btns">
        <button class="btn-outline" onclick="editProfile()">✏ Edit Profile</button>
        <button class="btn-danger-outline" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="section-title">My Posts</div>
    <div id="my-posts-list"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-feed" onclick="showPage('feed')">🏠</div>
    <div class="nav-item" id="nav-messages" onclick="showPage('messages')">💬</div>
    <div class="nav-item" id="nav-profile" onclick="showPage('profile')">👤</div>
  </div>
</div>
<div id="chat-screen">
  <div class="chat-topbar">
    <div class="chat-back" onclick="closeChat()">←</div>
    <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:14px;">?</div>
    <div class="chat-name" id="chat-name">Chat</div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="Type a message...">
    <button class="chat-send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>
<div class="modal-overlay" id="new-msg-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeNewMsg()">✕</button>
    <div class="modal-title">New Message</div>
    <input type="email" id="new-msg-email" placeholder="Enter recipient's email">
    <button class="btn-primary" onclick="startNewChat()">Start Chat</button>
  </div>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>

// তাহলে আপনি নাম পরিবর্তন করলেও আপনার অ্যাকাউন্টে সবসময় ভেরিফাইড ব্যাজ (✔) থাকবে।
const MY_ADMIN_EMAIL = "your-email@gmail.com"; 
// ==========================================

firebase.initializeApp({
  apiKey:"AIzaSyCb5kNVWdeSEqMgCONh3HiiJfUSOgEnIQo",

  projectId:"my-social-app-4bb92",
  storageBucket:"my-social-app-4bb92.firebasestorage.app",

const auth=firebase.auth();

let currentUser=null,currentUserData=null,currentChatId=null,currentChatUser=null,feedUnsub=null,chatUnsub=null;

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function avatarInitial(name){return name?name[0].toUpperCase():'?';}
function timeAgo(ts){if(!ts)return'';const ms=ts.toMillis?ts.toMillis():(ts.seconds?ts.seconds*1000:ts);const diff=Date.now()-ms;const m=Math.floor(diff/60000);const h=Math.floor(diff/3600000);if(m<1)return'Just now';if(m<60)return m+' min ago';if(h<24)return h+' hours ago';return Math.floor(h/24)+' days ago';}
function expiresIn(expMs){const r=expMs-Date.now();if(r<=0)return'Deleting...';const h=Math.floor(r/3600000);const m=Math.floor((r%3600000)/60000);return'Deletes in '+h+'h '+m+'m';}

// Verified Check Function
function getVerifiedBadge(email) {
    return email === MY_ADMIN_EMAIL ? '<span class="verified-icon" title="Verified Account">✔</span>' : '';
}

function switchTab(tab){document.getElementById('tab-login').classList.toggle('active',tab==='login');document.getElementById('tab-register').classList.toggle('active',tab==='register');document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none';document.getElementById('auth-msg').className='auth-msg';}

async function doRegister(){const name=document.getElementById('reg-name').value.trim();const email=document.getElementById('reg-email').value.trim();const pass=document.getElementById('reg-pass').value;const msg=document.getElementById('auth-msg');if(!name||!email||!pass){msg.textContent='Please fill in all fields.';msg.className='auth-msg error';return;}try{const cred=await auth.createUserWithEmailAndPassword(email,pass);await cred.user.updateProfile({displayName:na
