<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoChat V2</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f0f13;--surface:#1a1a24;--card:#22222f;--border:#2e2e3f;--accent:#6c63ff;--accent2:#a78bfa;--text:#e8e8f0;--muted:#8888aa;--danger:#ff4f4f;--success:#4fbe79;}
body.light-mode{--bg:#ffffff;--surface:#f0f2f5;--card:#ffffff;--border:#cccccc;--accent:#5b52e0;--accent2:#7c3aed;--text:#000000;--muted:#666666;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh; overscroll-behavior-y: none; touch-action: manipulation;}
.material-symbols-outlined { display: inline-block; white-space: nowrap; overflow: hidden; max-width: 1em; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f13 0%,#1a1228 100%);}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:92%;max-width:380px;}
.auth-logo{font-size:28px;font-weight:800;color:var(--accent2);text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:30px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:25px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);}
.auth-tab.active{background:var(--accent);color:#fff;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;}
.input-group input, .input-group select{width:100%;padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:30px;color:var(--text);font-size:14px;outline:none;}
.btn-primary{width:100%;padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px;}
.btn-capsule{padding:6px 18px; border-radius:30px; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; cursor:pointer;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:20px;font-weight:800;color:var(--accent2); cursor:pointer; transition: 0.2s;}
.topbar-logo:active{transform: scale(0.95);}
.icon-btn{padding:8px 16px;border-radius:30px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);position:relative; transition:0.2s; font-size:13px; font-weight:600;}
.bottom-nav{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);width:92%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:35px;display:flex;z-index:100; justify-content:space-around; padding:10px 0;box-shadow:0 8px 20px rgba(0,0,0,0.15);}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted); transition:0.3s; position:relative;}
.nav-item.active{color:var(--accent);}
.nav-item.active .material-symbols-outlined{font-variation-settings: 'FILL' 1;}
.post-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.post-actions{display:flex;gap:20px; margin-top:10px; align-items:center;}
.post-action-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0;}
.like-btn .material-symbols-outlined { font-size:28px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.like-btn:active .material-symbols-outlined { transform: scale(1.6); }
.comment-panel { display:none; position:fixed; inset:0; background:var(--bg); z-index:500; flex-direction:column; }
.comment-panel.open { display:flex; }
.profile-stats-container { display:flex; gap:10px; justify-content:center; margin:15px 0; }
.stats-capsule { padding:8px 16px; border-radius:30px; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:700; color:var(--text); }
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">✦ GoChat</div>
    <div class="auth-sub">Connect and share your moments</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>
    <div id="login-form">
      <div class="input-group"><label>Email</label><input type="email" id="login-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="input-group"><label>Name (No Emojis)</label><input type="text" id="reg-name" placeholder="Your real name"></div>
      <div class="input-group"><label>Email</label><input type="email" id="reg-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="reg-pass" placeholder="At least 6 characters"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>
<div id="app-screen">
  <div class="topbar"><div class="topbar-logo" onclick="refreshFeed()">✦ GoChat</div></div>
  <div class="page active" id="page-feed">
    <div class="composer" onclick="openCreatePost()" style="cursor:pointer;">
      <div class="composer-top">
        <div class="avatar" id="composer-avatar-trigger">?</div>
        <div style="flex:1; background:var(--bg); border:1px solid var(--border); border-radius:30px; padding:12px 18px; color:var(--muted); font-size:14px;">What's on your mind?</div>
        <span class="material-symbols-outlined" style="color:var(--success); font-size:28px;">image</span>
      </div>
    </div>
    <div class="feed-tabs"><div class="feed-tab active" id="tab-foryou" onclick="setFeedTab('foryou')">For You</div><div class="feed-tab" id="tab-friends" onclick="setFeedTab('friends')">Friends</div></div>
    <div id="feed-loading" class="loading"><span class="material-symbols-outlined">autorenew</span> Loading...</div>
    <div id="feed-list"></div>
  </div>
    <div class="page" id="page-profile">
    <div class="profile-header">
      <div class="profile-avatar-wrap"><div class="profile-avatar" id="profile-avatar-big">?</div><label class="avatar-edit-btn" for="avatar-input"><span class="material-symbols-outlined" style="font-size:16px;">edit</span></label><input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)"></div>
      <div class="profile-name" id="profile-name-display">Loading...</div>
      <div class="profile-stats-container">
          <div class="stats-capsule">Following: 379</div>
          <div class="stats-capsule" id="profile-followers-count">Followers: 901</div>
          <div class="stats-capsule">Likes: 13.8K</div>
      </div>
      <button class="btn-outline" onclick="openProfileEdit()" style="margin-top:10px; padding:8px 24px; font-size:12px;">Edit Profile</button>
    </div>
    <div class="section-title">My Posts</div><div id="my-posts-list"></div>
  </div>
  <div class="page" id="page-messages"><div class="section-title">Messages</div><div id="msg-list"></div></div>
    <div class="bottom-nav">
    <div class="nav-item active" onclick="showPage('feed')"><span class="material-symbols-outlined">home</span></div>
    <div class="nav-item" onclick="showPage('messages')"><span class="material-symbols-outlined">chat</span></div>
    <div class="nav-item" onclick="showPage('profile')"><span class="material-symbols-outlined">person</span></div>
  </div>
</div>
<div id="comment-panel" class="comment-panel">
  <div class="topbar"><div style="display:flex; align-items:center; gap:10px;"><span class="material-symbols-outlined" onclick="closeCommentPanel()">arrow_back</span><div style="font-weight:700;">Comments</div></div></div>
  <div id="comment-list" style="flex:1; overflow-y:auto; padding:16px;"></div>
  <div style="padding:16px; border-top:1px solid var(--border); display:flex; gap:10px;">
    <input type="text" id="comment-input" placeholder="Write a comment..." style="flex:1; padding:12px; border-radius:30px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
    <button class="btn-primary" onclick="postComment()">Post</button>
  </div>
</div>
<script>
let currentUser = {email: 'hmdabrar70@gmail.com', name: 'Sabbir Shikder'}; // আপনার মেইন আইডি
const botNames = ['Mim Islam', 'Rafiqul', 'Sumi', 'Tanvir', 'Hridoy', 'Fatema'];

function renderPost(post) {
  return `
    <div class="post-card">
      <div style="font-weight:700;">${post.author}</div>
      <div style="margin:8px 0;">${post.content}</div>
      <div class="post-actions">
        <button class="post-action-btn like-btn" onclick="toggleLike(this)">
          <span class="material-symbols-outlined">favorite</span> ${post.likes}
        </button>
        <button class="post-action-btn" onclick="openCommentPanel(${post.id})">
          <span class="material-symbols-outlined">chat_bubble</span> ${post.comments.length}
        </button>
      </div>
    </div>
  `;
}

function openCommentPanel(postId) {
  const panel = document.getElementById('comment-panel');
  panel.classList.add('open');
  // এখানে শুধু ওই পোস্টের কমেন্ট লোড হবে
  document.getElementById('comment-list').innerHTML = "<div>No comments yet...</div>";
}

function closeCommentPanel() {
  document.getElementById('comment-panel').classList.remove('open');
}
function triggerBot(postId) {
  if (currentUser.email === 'hmdabrar70@gmail.com') {
    setTimeout(() => {
      // বট অটো লাইক ও কমেন্ট করবে
      console.log("Bot activated for post: " + postId);
      // এখানে রিয়েলিস্টিক কমেন্ট যোগ করার লজিক
    }, 2000);
  }
}
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
}

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
}

function doLogin() {
  const email = document.getElementById('login-email').value;
  if (email === 'hmdabrar70@gmail.com') {
    document.getElementById('auth-screen').style.display = 'none';
  } else {
    alert("Please use the authorized email!");
  }
}
</script>
</body>
</html>
