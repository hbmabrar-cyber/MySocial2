<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0f0f13;--surface:#1a1a24;--card:#22222f;--border:#2e2e3f;
--accent:#6c63ff;--accent2:#a78bfa;--text:#e8e8f0;--muted:#8888aa;
--danger:#ff4f4f;--success:#4fbe79;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f13 0%,#1a1228 100%);}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:92%;max-width:380px;}
.auth-logo{font-size:28px;font-weight:800;color:var(--accent2);text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);}
.auth-tab.active{background:var(--accent);color:#fff;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;}
.input-group input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;}
.input-group input:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.auth-msg{text-align:center;font-size:13px;margin-top:14px;padding:10px;border-radius:8px;display:none;}
.auth-msg.error{background:#ff4f4f22;color:#ff4f4f;display:block;}
.auth-msg.success{background:#4fbe7922;color:#4fbe79;display:block;}
#app-screen{display:none;max-width:480px;margin:0 auto;padding-bottom:40px;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:20px;font-weight:800;color:var(--accent2);}
.btn-danger{padding:8px 18px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.composer{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.composer textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;font-family:inherit;outline:none;min-height:60px;margin-bottom:10px;}
.compose-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;float:right;}
.post-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;}
.post-name{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--accent2);}
.post-time{font-size:11px;color:var(--muted);margin-bottom:8px;}
.post-text{font-size:14px;line-height:1.6;}
.empty-feed{text-align:center;padding:60px 20px;color:var(--muted);}
#debug-box{background:#000;color:#0f0;font-size:11px;padding:10px;margin-top:10px;border-radius:8px;text-align:left;display:none;max-height:150px;overflow-y:auto;word-break:break-all;}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">GoChat</div>
    <div class="auth-sub">Your own social space</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>
    <div id="login-form">
      <div class="input-group"><label>Email</label><input type="email" id="login-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="login-pass" placeholder="********"></div>
      <button class="btn-primary" onclick="doLogin()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="input-group"><label>Name</label><input type="text" id="reg-name" placeholder="Your name"></div>
      <div class="input-group"><label>Email</label><input type="email" id="reg-email" placeholder="example@gmail.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="reg-pass" placeholder="At least 6 characters"></div>
      <div class="input-group"><label>Confirm Password</label><input type="password" id="reg-confirm-pass" placeholder="Re-enter password"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
    <div id="debug-box"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">GoChat</div>
    <button class="btn-danger" onclick="doLogout()">Logout</button>
  </div>
  <div class="composer">
    <textarea id="post-text" placeholder="What's on your mind?" rows="2"></textarea>
    <button class="compose-btn" onclick="submitPost()">Post</button>
  </div>
  <div id="feed-list"></div>
</div>

<script>
var SUPABASE_URL = 'https://czkgmxluugegzrjugaxr.supabase.co';
var SUPABASE_KEY = 'sb_publishable_aLoBLK3CV7A19JSQIC-7sQ_gp6pCXKl';
var currentUserName = '';

function debugLog(msg){
  var box = document.getElementById('debug-box');
  if(!box) return;
  box.style.display='block';
  box.innerHTML += msg + '<br>';
}

function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-msg').className = 'auth-msg';
}

function showMsg(text, type){
  var msg = document.getElementById('auth-msg');
  msg.textContent = text;
  msg.className = 'auth-msg ' + type;
}

function doRegister(){
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var pass = document.getElementById('reg-pass').value;
  var confirmPass = document.getElementById('reg-confirm-pass').value;

  if(!name || !email || !pass || !confirmPass){
    showMsg('Please fill in all fields.', 'error');
    return;
  }
  if(pass.length < 6){
    showMsg('Password must be at least 6 characters.', 'error');
    return;
  }
  if(pass !== confirmPass){
    showMsg('Passwords do not match!', 'error');
    return;
  }

  fetch(SUPABASE_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY
    },
    body: JSON.stringify({
      email: email,
      password: pass,
      data: { name: name }
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    if(data.error || data.msg){
      showMsg('Error: ' + (data.msg || data.error), 'error');
      return;
    }
    showMsg('Account created successfully! Please login.', 'success');
    setTimeout(function(){ switchTab('login'); }, 1500);
  })
  .catch(function(e){
    showMsg('Network error: ' + e.message, 'error');
  });
}

function doLogin(){
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;

  if(!email || !pass){
    showMsg('Please fill in all fields.', 'error');
    return;
  }

  fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY
    },
    body: JSON.stringify({ email: email, password: pass })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    if(data.error || data.error_description){
      showMsg('Incorrect email or password.', 'error');
      return;
    }
    localStorage.setItem('gochat_session', JSON.stringify(data));
    checkUser();
  })
  .catch(function(e){
    showMsg('Network error: ' + e.message, 'error');
  });
}

function doLogout(){
  localStorage.removeItem('gochat_session');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function getSession(){
  var session = localStorage.getItem('gochat_session');
  if(!session) return null;
  return JSON.parse(session);
}

function checkUser(){
  var data = getSession();
  if(data && data.user){
    currentUserName = (data.user.user_metadata && data.user.user_metadata.name) || data.user.email || 'User';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadFeed();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
}

function submitPost(){
  var text = document.getElementById('post-text').value.trim();
  if(!text){
    alert('Write something first!');
    return;
  }
  var session = getSession();
  if(!session){
    alert('Please login first.');
    return;
  }

  fetch(SUPABASE_URL + '/rest/v1/posts', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + session.access_token,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      user_name: currentUserName,
      content: text
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    document.getElementById('post-text').value = '';
    loadFeed();
  })
  .catch(function(e){
    alert('Error posting: ' + e.message);
  });
}

function timeAgo(dateStr){
  var diff = Date.now() - new Date(dateStr).getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(diff / 3600000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + ' min ago';
  if(hours < 24) return hours + ' hours ago';
  return Math.floor(hours/24) + ' days ago';
}

function loadFeed(){
  var session = getSession();
  if(!session) return;

  fetch(SUPABASE_URL + '/rest/v1/posts?select=*&order=created_at.desc', {
    method: 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + session.access_token
    }
  })
  .then(function(res){ return res.json(); })
  .then(function(posts){
    var feedList = document.getElementById('feed-list');
    if(!posts || posts.length === 0){
      feedList.innerHTML = '<div class="empty-feed">No posts yet. Be the first to post!</div>';
      return;
    }
    var html = '';
    for(var i=0; i<posts.length; i++){
      var p = posts[i];
      html += '<div class="post-card">';
      html += '<div class="post-name">' + p.user_name + '</div>';
      html += '<div class="post-time">' + timeAgo(p.created_at) + '</div>';
      html += '<div class="post-text">' + p.content + '</div>';
      html += '</div>';
    }
    feedList.innerHTML = html;
  })
  .catch(function(e){
    document.getElementById('feed-list').innerHTML = '<div class="empty-feed">Error loading posts.</div>';
  });
}

checkUser();
</script>
</body>
</html>
